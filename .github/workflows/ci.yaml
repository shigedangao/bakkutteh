name: ci

on: [push]

jobs:
  clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: install clippy
        run: rustup component add clippy
      - name: run unit test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-features
      - uses: uncenter/setup-taplo@v1
        with:
          version: "0.8.1"
      - run: taplo fmt Cargo.toml --check
